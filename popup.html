<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TG Link Collector</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="title-row">
        <div class="title-group">
          <span id="statusIndicator" class="status-indicator idle" title="Готов к работе"></span>
          <div class="title">TG Link Collector</div>
        </div>
        <button id="clearBtn" class="btn ghost danger" title="Очистить все данные">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
        </button>
      </div>
      <div class="stats" id="stats">Ссылок: 0 · Номеров: 0 · Дублей: 0 · Логи: 0</div>
    </header>

    <section class="controls">
      <div class="control-group main-controls">
        <button id="startBtn" class="btn primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          Собрать
        </button>
        <button id="pauseBtn" class="btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
          Пауза
        </button>
        <button id="stopBtn" class="btn danger" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h12v12H6z"/>
          </svg>
          Стоп
        </button>
      </div>
      <div class="control-group export-controls">
        <button id="exportBtn" class="btn small">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          Ссылки
        </button>
        <button id="exportNumbersBtn" class="btn small">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
          </svg>
          Номера
        </button>
        <button id="exportDupBtn" class="btn small">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Дубли
        </button>
        <button id="exportLogsBtn" class="btn small">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
          </svg>
          Логи
        </button>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="links">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
        </svg>
        Ссылки
      </button>
      <button class="tab" data-tab="numbers">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72"/>
        </svg>
        Номера
      </button>
      <button class="tab" data-tab="duplicates">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        Дубли
      </button>
      <button class="tab" data-tab="logs">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <path d="M14 2v6h6"/>
        </svg>
        Логи
      </button>
      <button class="tab" data-tab="settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        Настройки
      </button>
    </nav>

    <main class="tab-panels">
      <section id="links" class="panel active">
        <div id="linksList" class="list"></div>
      </section>
      <section id="numbers" class="panel">
        <div id="numbersList" class="list"></div>
      </section>
      <section id="duplicates" class="panel">
        <div id="duplicatesList" class="list"></div>
      </section>
      <section id="logs" class="panel">
        <div id="logsList" class="list log-list"></div>
      </section>
      <section id="settings" class="panel">
        <div class="settings-section">
          <h3 class="settings-title">Селекторы</h3>
          
          <label class="field">
            <div class="field-header">
              <span>Контейнер скролла</span>
              <button id="pickScrollSelectorBtn" class="btn tiny picker-btn" title="Выбрать мышкой">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                  <path d="M13 13l6 6"/>
                </svg>
                Выбрать
              </button>
            </div>
            <textarea id="scrollSelector" rows="2" placeholder="CSS селектор контейнера"></textarea>
          </label>
          
          <label class="field">
            <div class="field-header">
              <span>Селекторы ссылок</span>
              <button id="pickLinkSelectorBtn" class="btn tiny picker-btn" title="Добавить мышкой">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                  <path d="M13 13l6 6"/>
                </svg>
                Добавить
              </button>
            </div>
            <textarea id="linkSelectors" rows="4" placeholder="По одному селектору в строке"></textarea>
          </label>
          
          <button id="testSelectorsBtn" class="btn small">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <path d="M22 4L12 14.01l-3-3"/>
            </svg>
            Проверить селекторы
          </button>
          <div id="testResult" class="test-result" style="display: none;"></div>
        </div>

        <div class="settings-section">
          <h3 class="settings-title">Параметры скролла</h3>
          <div class="grid">
            <label class="field">
              <span>Шаг скролла (px)</span>
              <input id="scrollStep" type="number" min="50" max="2000" />
            </label>
            <label class="field">
              <span>Пауза (мс)</span>
              <input id="scrollDelay" type="number" min="100" max="5000" />
            </label>
            <label class="field">
              <span>Таймаут (мс)</span>
              <input id="inactivityTimeout" type="number" min="10000" max="600000" />
            </label>
            <label class="field">
              <span>Лимит шагов</span>
              <input id="maxSteps" type="number" min="0" max="100000" placeholder="0 = без лимита" />
            </label>
          </div>
        </div>

        <div class="settings-section">
          <h3 class="settings-title">Обработка ошибок</h3>
          <div class="grid">
            <label class="field">
              <span>Попытки retry</span>
              <input id="retryAttempts" type="number" min="1" max="10" />
            </label>
            <label class="field">
              <span>Задержка retry (мс)</span>
              <input id="retryDelay" type="number" min="100" max="10000" />
            </label>
          </div>
        </div>

        <div class="settings-actions">
          <div class="btn-row">
            <button id="saveSettingsBtn" class="btn primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                <path d="M17 21v-8H7v8M7 3v5h8"/>
              </svg>
              Сохранить
            </button>
            <button id="resetSettingsBtn" class="btn ghost">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
              </svg>
              Сброс
            </button>
          </div>
          <div class="btn-row">
            <button id="exportSettingsBtn" class="btn small">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
              </svg>
              Экспорт
            </button>
            <button id="importSettingsBtn" class="btn small">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
              </svg>
              Импорт
            </button>
            <button id="restoreFromCloudBtn" class="btn small">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/>
              </svg>
              Из облака
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
